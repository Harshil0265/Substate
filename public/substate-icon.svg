<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Gradients -->
  <defs>
    <linearGradient id="icon-gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="24" cy="24" r="23" fill="#FFFFFF" stroke="#F3F4F6" stroke-width="2"/>
  
  <!-- Layered Stack Icon - Centered -->
  <g transform="translate(9, 12)">
    <!-- Layer 3 (Top) - Smallest -->
    <rect x="8" y="0" width="14" height="5" rx="2" fill="url(#icon-gradient1)" opacity="0.95"/>
    
    <!-- Layer 2 (Middle) -->
    <rect x="5" y="9" width="20" height="5" rx="2" fill="url(#icon-gradient2)" opacity="0.97"/>
    
    <!-- Layer 1 (Bottom) - Largest -->
    <rect x="0" y="18" width="30" height="5" rx="2" fill="url(#icon-gradient3)"/>
    
    <!-- Subtle connecting lines -->
    <line x1="15" y1="5" x2="15" y2="9" stroke="url(#icon-gradient2)" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="14" x2="15" y2="18" stroke="url(#icon-gradient3)" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
